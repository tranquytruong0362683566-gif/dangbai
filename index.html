<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Reels (Ver 6 - Multi-Page Song Song)</title>
  <style>
    :root {
      --bg-main: #f1f5f9;
      --bg-card: #ffffff;
      --border-color: #cbd5e1;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #ea580c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); font-size: 13px; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .window-modal { background: var(--bg-card); width: 100%; max-width: 800px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); overflow: hidden; }
    
    .window-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
    .window-title { font-size: 16px; font-weight: bold; color: #000; }
    .close-btn { background: none; border: none; font-size: 18px; color: var(--text-muted); cursor: pointer; }

    .fb-account-bar { background: #f8fafc; padding: 8px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; }
    .btn-logout { background: none; border: 1px solid var(--border-color); padding: 2px 8px; border-radius: 4px; cursor: pointer; color: var(--text-muted); }
    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    .window-body { padding: 16px; }
    .grid-container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }

    .center-box { text-align: center; padding: 40px 20px; }
    .btn-fb-login { background: #1877f2; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .btn-fb-login:hover { background: #166fe0; }

    .form-group { margin-bottom: 14px; }
    .form-row-inline { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .form-group label { font-weight: bold; color: #000; }
    
    .checkbox-label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; font-weight: normal; font-size: 13px; }
    .checkbox-label input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }

    textarea, select, input[type="text"], input[type="number"] {
      width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; color: #000; outline: none; background: #fff;
    }
    textarea { height: 90px; resize: none; }
    
    .video-picker-container { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .file-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500; }
    .file-btn:hover { background: #e2e8f0; }
    .file-status-text { color: var(--primary); font-weight: bold; font-size: 12px; margin-top: 4px; }

    .inline-input-box { display: flex; align-items: center; gap: 6px; }
    .inline-input-box input { width: 60px; text-align: center; padding: 4px; }
    
    .right-col .form-group { margin-bottom: 16px; }

    .window-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-top: 1px solid var(--border-color); background: #fff; }
    .btn-submit { background: #1d4ed8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: background 0.3s; }
    .btn-submit:hover { background: #1e40af; }

    .status-box { padding: 10px 12px; border-radius: 4px; font-size: 13px; margin-top: 10px; display: none; line-height: 1.5; }
    .status-box.show { display: block; }
    .status-box.ok { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status-box.err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .status-box.loading { background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }
    
    .progress-bar-wrap { background: #e2e8f0; border-radius: 4px; height: 6px; margin-top: 8px; overflow: hidden; display: none; }
    .progress-bar-wrap.show { display: block; }
    .progress-bar { height: 100%; background: #1d4ed8; width: 0%; transition: width 0.3s; }
    
    .post-link { color: #1d4ed8; font-weight: bold; text-decoration: none; }
    .post-link:hover { text-decoration: underline; }

    .page-multiselect { border: 1px solid var(--border-color); border-radius: 4px; max-height: 130px; overflow-y: auto; background: #fff; margin-top: 4px; }
    .page-multiselect-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .page-multiselect-item:last-child { border-bottom: none; }
    .page-multiselect-item:hover { background: #f8fafc; }
    .page-multiselect-item img { width: 20px; height: 20px; border-radius: 50%; }
    .page-multiselect-item span.pname { font-weight: 500; flex: 1; }
    .page-multiselect-item input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }

    .page-cards-wrap { display: flex; flex-direction: column; gap: 14px; margin-top: 14px; }
    .page-card { border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
    .page-card-header { background: #f8fafc; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
    .page-card-header .pname { font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .page-card-header img { width: 22px; height: 22px; border-radius: 50%; }
    .page-card-badge { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
    .page-card-badge.idle { background: #e2e8f0; color: #475569; }
    .page-card-badge.running { background: #dbeafe; color: #1d4ed8; }
    .page-card-badge.ok { background: #d1fae5; color: #065f46; }
    .page-card-badge.err { background: #fee2e2; color: #991b1b; }
    .page-card-body { padding: 12px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
    .page-card-status { font-size: 12px; padding: 8px 10px; border-radius: 4px; margin-top: 8px; line-height: 1.5; }
    .page-card-status.loading { background: #e0f2fe; color: #075985; }
    .page-card-status.ok { background: #d1fae5; color: #065f46; }
    .page-card-status.err { background: #fee2e2; color: #991b1b; }
    .page-card-progress-wrap { background: #e2e8f0; border-radius: 4px; height: 5px; margin-top: 8px; overflow: hidden; display: none; }
    .page-card-progress-wrap.show { display: block; }
    .page-card-progress { height: 100%; background: #1d4ed8; width: 0%; transition: width 0.3s; }

    .global-bar { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 8px 12px; border: 1px dashed var(--border-color); border-radius: 4px; margin-top: 12px; font-size: 12px; }
  </style>
</head>
<body>

  <div class="window-modal">
    <div class="window-header">
      <div class="window-title">Đăng Reels (Ver 5 - Vòng Lặp Liên Tục Tự Động)</div>
      <button class="close-btn">&times;</button>
    </div>

    <div class="fb-account-bar">
      <div class="user-info">
        <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=FB&background=1d4ed8&color=fff" alt="Avatar">
        <div>Trạng thái: <span id="accountName" style="font-weight: bold; color: var(--text-muted);">Chưa đăng nhập Facebook</span> <span id="ext-status"></span></div>
      </div>
      <button class="btn-logout" id="btnLogout" style="display:none;">Đăng xuất</button>
    </div>

    <div class="window-body">
      <div id="loginView" class="center-box">
        <p style="margin-bottom: 15px; color: var(--text-muted);">Vui lòng liên kết tài khoản để tải danh sách Fanpage và cấu hình đăng bài.</p>
        <button class="btn-fb-login" id="btnFbLogin">📘 Đăng nhập bằng Facebook</button>
        <div class="status-box" id="loginStatus"></div>

        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--border-color); text-align: left;">
          <label style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px;">
            Hoặc dán Long-lived Page Tokens (JSON từ <code>me/accounts</code>) — lưu vào trình duyệt này, không commit vào code:
          </label>
          <textarea id="manualTokenInput" style="height: 110px; font-family: monospace; font-size: 12px;" placeholder='[{"id":"123456","name":"Page A","access_token":"EAA..."},{"id":"789012","name":"Page B","access_token":"EAA..."}]'></textarea>
          <div style="display: flex; gap: 8px; margin-top: 8px;">
            <button class="file-btn" type="button" id="btnSaveManualTokens">💾 Lưu vào trình duyệt này</button>
            <button class="file-btn" type="button" id="btnClearManualTokens" style="color: var(--danger);">🗑️ Xóa token đã lưu</button>
          </div>
          <div class="status-box" id="manualTokenStatus"></div>
        </div>
      </div>

      <div id="postView" style="display:none;">
        
        <div class="form-group" style="background: #f8fafc; padding: 8px; border: 1px dashed var(--border-color); border-radius: 4px;">
          <label style="font-size: 12px; color: var(--text-muted);">Chọn Fanpage mục tiêu (chọn nhiều để đăng song song):</label>
          <div class="page-multiselect" id="pageMultiselect"></div>
        </div>

        <div class="global-bar">
          <div>
            <label style="color: var(--warning); font-weight: bold;">⏱️ Chu kỳ lặp lại liên tục (áp dụng cho tất cả page):</label>
            <select id="loopInterval" style="margin-top: 6px; width: auto; display: inline-block;">
              <option value="30">30 phút</option>
              <option value="60" selected>60 phút</option>
              <option value="1">1 phút (test)</option>
            </select>
          </div>
          <div style="color: var(--text-muted); max-width: 280px; text-align: right;">
            Mỗi page chạy vòng lặp độc lập — dừng 1 page không ảnh hưởng các page khác.
          </div>
        </div>

        <div class="page-cards-wrap" id="pageCardsWrap"></div>
      </div>
    </div>

    <div class="window-footer">
      <div>
        <span style="color: var(--text-muted); font-weight: bold;">Chế độ: Đăng song song nhiều Fanpage, lặp lại liên tục</span>
      </div>
      <div>
        <button class="btn-submit" id="btnSubmit">Bắt đầu đăng liên tục</button>
      </div>
    </div>
  </div>

  <script>
    const FB_APP_ID = '1952106285437493';
    const GRAPH_VERSION = 'v19.0';
    const TOKEN_STORAGE_KEY = 'fb_manual_long_lived_pages';

    let currentAccessToken = null;
    let currentPages = [];

    // ================= LONG-LIVED TOKEN THỦ CÔNG (lưu trong localStorage trình duyệt, KHÔNG nằm trong code) =================
    // Lấy theo 3 bước: FB.getAccessToken() -> oauth/access_token (fb_exchange_token) -> me/accounts
    // page.access_token lấy từ bước 3 đã tự động là long-lived, KHÔNG cần đổi lại lần nữa.
    function readStoredPages() {
      try {
        const raw = localStorage.getItem(TOKEN_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(p => p && p.id && p.name && p.access_token);
      } catch (err) {
        return [];
      }
    }

    // ================= KHỞI TẠO SDK =================
    window.fbAsyncInit = function () {
      FB.init({ appId: FB_APP_ID, cookie: true, xfbml: false, version: GRAPH_VERSION });

      const storedPages = readStoredPages();
      if (storedPages.length > 0) {
        loadManualPages(storedPages);
        return;
      }

      FB.getLoginStatus(function (response) {
        if (response.status === 'connected') {
          onLoginSuccess(response.authResponse.accessToken);
        }
      });
    };

    // Nạp page list từ token long-lived đã lưu trong localStorage, bỏ qua hẳn FB.login
    function loadManualPages(pages) {
      currentPages = pages;

      document.getElementById('accountName').textContent = 'Long-lived Token (lưu trình duyệt)';
      document.getElementById('ext-status').textContent = ' (Đã kết nối)';
      document.getElementById('ext-status').style.color = '#16a34a';
      document.getElementById('btnLogout').style.display = 'inline-block';

      const ms = document.getElementById('pageMultiselect');
      ms.innerHTML = currentPages.map(p => `
        <label class="page-multiselect-item" for="pagechk_${p.id}">
          <input type="checkbox" id="pagechk_${p.id}" value="${p.id}">
          <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}" alt="">
          <span class="pname">${p.name}</span>
        </label>
      `).join('');
      ms.querySelectorAll('input[type="checkbox"]').forEach(chk => {
        chk.addEventListener('change', () => togglePageCard(chk.value, chk.checked));
      });

      document.getElementById('loginView').style.display = 'none';
      document.getElementById('postView').style.display = 'block';
    }

    // Lưu JSON dán tay vào localStorage — không bao giờ chạm vào file hay Git
    document.getElementById('btnSaveManualTokens').addEventListener('click', () => {
      const statusEl = document.getElementById('manualTokenStatus');
      const raw = document.getElementById('manualTokenInput').value.trim();

      if (!raw) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = '❌ Chưa dán gì vào ô JSON.';
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (err) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = '❌ JSON không hợp lệ: ' + err.message;
        return;
      }

      if (!Array.isArray(parsed) || parsed.length === 0) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = '❌ Cần là một mảng chứa ít nhất 1 page.';
        return;
      }

      const invalidIndex = parsed.findIndex(p => !p || !p.id || !p.name || !p.access_token);
      if (invalidIndex !== -1) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = `❌ Page tại vị trí ${invalidIndex} thiếu id, name hoặc access_token.`;
        return;
      }

      localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify(parsed));
      statusEl.className = 'status-box show ok';
      statusEl.textContent = `✅ Đã lưu ${parsed.length} page vào trình duyệt này. Đang nạp...`;
      setTimeout(() => loadManualPages(parsed), 600);
    });

    // Xóa token khỏi localStorage, quay lại trạng thái chưa đăng nhập
    document.getElementById('btnClearManualTokens').addEventListener('click', () => {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      document.getElementById('manualTokenInput').value = '';
      const statusEl = document.getElementById('manualTokenStatus');
      statusEl.className = 'status-box show ok';
      statusEl.textContent = '🗑️ Đã xóa token đã lưu khỏi trình duyệt này.';
    });

    (function (d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s); js.id = id;
      js.src = "https://connect.facebook.net/vi_VN/sdk.js";
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));

    // ================= XỬ LÝ ĐĂNG NHẬP =================
    document.getElementById('btnFbLogin').addEventListener('click', () => {
      const statusEl = document.getElementById('loginStatus');
      statusEl.className = 'status-box show loading';
      statusEl.textContent = '⏳ Đang mở cửa sổ đăng nhập Facebook...';

      FB.login(function (response) {
        if (response.authResponse) {
          onLoginSuccess(response.authResponse.accessToken);
        } else {
          statusEl.className = 'status-box show err';
          statusEl.textContent = '❌ Bạn đã hủy đăng nhập hoặc từ chối cấp quyền.';
        }
      }, { scope: 'pages_show_list,pages_manage_posts,pages_read_engagement' });
    });

    async function onLoginSuccess(accessToken) {
      currentAccessToken = accessToken;
      const statusEl = document.getElementById('loginStatus');
      statusEl.className = 'status-box show loading';
      statusEl.textContent = '⏳ Đang lấy danh sách Page...';

      try {
        const meRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/me?fields=name,picture&access_token=${accessToken}`);
        const me = await meRes.json();
        if (me.error) throw new Error(me.error.message);

        document.getElementById('accountName').textContent = me.name;
        if (me.picture && me.picture.data) document.getElementById('userAvatar').src = me.picture.data.url;
        document.getElementById('ext-status').textContent = ' (Đã kết nối)';
        document.getElementById('ext-status').style.color = '#16a34a';
        document.getElementById('btnLogout').style.display = 'inline-block';

        const pagesRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/me/accounts?fields=name,id,access_token,category,picture&limit=250&access_token=${accessToken}`);
        const pagesData = await pagesRes.json();
        if (pagesData.error) throw new Error(pagesData.error.message);

        currentPages = pagesData.data || [];

        if (currentPages.length === 0) {
          statusEl.className = 'status-box show err';
          statusEl.textContent = '⚠️ Tài khoản này không quản lý Fanpage nào.';
          return;
        }

        const ms = document.getElementById('pageMultiselect');
        ms.innerHTML = currentPages.map(p => `
          <label class="page-multiselect-item" for="pagechk_${p.id}">
            <input type="checkbox" id="pagechk_${p.id}" value="${p.id}">
            <img src="${(p.picture && p.picture.data && p.picture.data.url) || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name)}" alt="">
            <span class="pname">${p.name}</span>
          </label>
        `).join('');
        ms.querySelectorAll('input[type="checkbox"]').forEach(chk => {
          chk.addEventListener('change', () => togglePageCard(chk.value, chk.checked));
        });

        document.getElementById('loginView').style.display = 'none';
        document.getElementById('postView').style.display = 'block';

      } catch (err) {
        statusEl.className = 'status-box show err';
        statusEl.textContent = `❌ Lỗi: ${err.message}`;
      }
    }

    function resetToLoginView() {
      currentAccessToken = null;
      currentPages = [];
      document.getElementById('accountName').textContent = 'Chưa đăng nhập Facebook';
      document.getElementById('userAvatar').src = 'https://ui-avatars.com/api/?name=FB&background=1d4ed8&color=fff';
      document.getElementById('ext-status').textContent = '';
      document.getElementById('btnLogout').style.display = 'none';
      document.getElementById('postView').style.display = 'none';
      document.getElementById('loginView').style.display = 'block';
      document.getElementById('loginStatus').className = 'status-box';
      stopAllLoops();
      document.getElementById('pageCardsWrap').innerHTML = '';
    }

    document.getElementById('btnLogout').addEventListener('click', () => {
      const hasManualTokens = readStoredPages().length > 0;

      if (hasManualTokens) {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        document.getElementById('manualTokenInput').value = '';
        resetToLoginView();
        return;
      }

      FB.logout(function () {
        resetToLoginView();
      });
    });

    // ================= QUẢN LÝ THẺ PAGE ĐỘNG (MULTI-PAGE) =================
    // Mỗi page có trạng thái loop độc lập: { active, timeoutId }
    const pageLoops = {};

    function togglePageCard(pageId, isChecked) {
      const wrap = document.getElementById('pageCardsWrap');
      const existing = document.getElementById(`pagecard_${pageId}`);

      if (isChecked) {
        if (existing) return;
        const page = currentPages.find(p => p.id === pageId);
        const card = document.createElement('div');
        card.className = 'page-card';
        card.id = `pagecard_${pageId}`;
        card.innerHTML = `
          <div class="page-card-header">
            <div class="pname">
              <img src="${(page.picture && page.picture.data && page.picture.data.url) || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(page.name)}" alt="">
              ${page.name}
            </div>
            <span class="page-card-badge idle" id="badge_${pageId}">Chưa chạy</span>
          </div>
          <div class="page-card-body">
            <div>
              <div class="form-group">
                <label style="color: var(--primary);">Nội dung Comment tự động:</label>
                <textarea id="comment_${pageId}" placeholder="Nội dung comment riêng cho page này..."></textarea>
              </div>
              <div class="inline-input-box">
                <label class="checkbox-label">
                  <input type="checkbox" id="enableComment_${pageId}" checked> Comment sau
                </label>
                <input type="number" id="commentDelay_${pageId}" value="90" style="width: 50px;">
                <span>giây</span>
              </div>
              <div class="form-group" style="margin-top: 14px;">
                <label style="color: var(--warning);">Auto-reply người đã comment:</label>
                <textarea id="autoReply_${pageId}" placeholder="Câu trả lời cố định cho mọi comment trên video của page này..."></textarea>
                <label class="checkbox-label" style="margin-top: 6px;">
                  <input type="checkbox" id="enableAutoReply_${pageId}"> Bật auto-reply (quét theo chu kỳ vòng lặp đăng bài)
                </label>
              </div>
            </div>
            <div>
              <label>Kho Video riêng cho page này:</label>
              <div class="video-picker-container">
                <button class="file-btn" type="button" onclick="document.getElementById('videoFile_${pageId}').click()">Mở thư mục</button>
                <input type="file" id="videoFile_${pageId}" style="display:none" accept="video/*" multiple>
              </div>
              <div class="file-status-text" id="fileText_${pageId}">Chưa có video nào được chọn</div>
            </div>
          </div>
          <div class="page-card-progress-wrap" id="progressWrap_${pageId}">
            <div class="page-card-progress" id="progressBar_${pageId}"></div>
          </div>
          <div class="page-card-status" id="status_${pageId}" style="display:none;"></div>
          <div class="page-card-status" id="replyStatus_${pageId}" style="display:none;"></div>
        `;
        wrap.appendChild(card);

        document.getElementById(`videoFile_${pageId}`).addEventListener('change', function () {
          const count = this.files.length;
          document.getElementById(`fileText_${pageId}`).textContent = count > 0
            ? `✔️ Đã nạp ${count} video (Sẽ chọn ngẫu nhiên mỗi lượt đăng)`
            : 'Chưa có video nào được chọn';
        });

        pageLoops[pageId] = { active: false, timeoutId: null, repliedCommentIds: new Set() };
      } else {
        stopPageLoop(pageId);
        delete pageLoops[pageId];
        if (existing) existing.remove();
      }
    }

    function setBadge(pageId, state, text) {
      const badge = document.getElementById(`badge_${pageId}`);
      if (!badge) return;
      badge.className = `page-card-badge ${state}`;
      badge.textContent = text;
    }

    // ================= ĐIỀU KHIỂN BẬT / TẮT VÒNG LẶP SONG SONG TẤT CẢ PAGE =================
    let isRunning = false;

    document.getElementById('btnSubmit').addEventListener('click', async () => {
      if (isRunning) {
        stopAllLoops();
      } else {
        await startAllLoops();
      }
    });

    function stopAllLoops() {
      isRunning = false;
      Object.keys(pageLoops).forEach(pageId => stopPageLoop(pageId));

      const btn = document.getElementById('btnSubmit');
      btn.textContent = 'Bắt đầu đăng liên tục';
      btn.style.background = 'var(--primary)';
    }

    function stopPageLoop(pageId) {
      const loop = pageLoops[pageId];
      if (!loop) return;
      loop.active = false;
      clearTimeout(loop.timeoutId);
      setBadge(pageId, 'idle', 'Đã dừng');
      const progressWrap = document.getElementById(`progressWrap_${pageId}`);
      if (progressWrap) progressWrap.className = 'page-card-progress-wrap';
    }

    async function startAllLoops() {
      const selectedIds = Object.keys(pageLoops);

      if (selectedIds.length === 0) { alert('⚠️ Vui lòng chọn ít nhất 1 Fanpage để đăng.'); return; }

      for (const pageId of selectedIds) {
        const fileInput = document.getElementById(`videoFile_${pageId}`);
        const commentContent = document.getElementById(`comment_${pageId}`).value.trim();
        const isEnableComment = document.getElementById(`enableComment_${pageId}`).checked;
        const page = currentPages.find(p => p.id === pageId);

        if (fileInput.files.length === 0) { alert(`⚠️ Page "${page.name}" chưa chọn video nào.`); return; }
        if (isEnableComment && !commentContent) { alert(`⚠️ Page "${page.name}" đã bật Comment tự động nhưng chưa nhập nội dung.`); return; }
      }

      isRunning = true;
      const btn = document.getElementById('btnSubmit');
      btn.textContent = '🔴 Dừng tất cả Page';
      btn.style.background = 'var(--danger)';

      // Mỗi page khởi động vòng lặp riêng, chạy song song độc lập (không await tuần tự)
      selectedIds.forEach(pageId => {
        pageLoops[pageId].active = true;
        triggerNextPostForPage(pageId);
      });
    }

    // Cơ chế lập lịch đệ quy theo từng page, độc lập với các page khác
    async function triggerNextPostForPage(pageId) {
      const loop = pageLoops[pageId];
      if (!loop || !loop.active) return;

      await runPostSequenceForPage(pageId);

      if (!loop.active) return;

      await replyToUnansweredComments(pageId);

      if (!loop.active) return;

      const intervalMins = parseInt(document.getElementById('loopInterval').value) || 60;
      const statusEl = document.getElementById(`status_${pageId}`);

      statusEl.style.display = 'block';
      statusEl.className = 'page-card-status show loading';
      statusEl.innerHTML += `<br><br>✅ <b>Chu kỳ hoàn tất!</b><br>⏳ Đếm ngược <b>${intervalMins} phút</b> tới lượt kế tiếp...`;
      setBadge(pageId, 'running', `Chờ ${intervalMins}p`);

      loop.timeoutId = setTimeout(() => triggerNextPostForPage(pageId), intervalMins * 60 * 1000);
    }

    // ================= AUTO-REPLY COMMENT (QUÉT TOÀN BỘ VIDEO CỦA PAGE, CẢ CŨ VÀ MỚI) =================
    // Dùng repliedCommentIds trong pageLoops để không trả lời trùng 1 comment 2 lần qua các chu kỳ.
    async function replyToUnansweredComments(pageId) {
      const loop = pageLoops[pageId];
      const page = currentPages.find(p => p.id === pageId);
      const enableAutoReply = document.getElementById(`enableAutoReply_${pageId}`).checked;
      const replyMessage = document.getElementById(`autoReply_${pageId}`).value.trim();
      const replyStatusEl = document.getElementById(`replyStatus_${pageId}`);

      if (!enableAutoReply || !replyMessage) return;

      replyStatusEl.style.display = 'block';
      replyStatusEl.className = 'page-card-status show loading';
      replyStatusEl.innerHTML = `💬 Đang quét comment chưa trả lời trên các video của <b>${page.name}</b>...`;

      try {
        // Lấy toàn bộ video của page (cũ + mới), không chỉ video vừa đăng lượt này
        const videosRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/${page.id}/videos?fields=id&limit=50&access_token=${page.access_token}`);
        const videosData = await videosRes.json();
        if (videosData.error) throw new Error(videosData.error.message);

        const videoIds = (videosData.data || []).map(v => v.id);
        let repliedCount = 0;

        for (const videoId of videoIds) {
          if (!loop.active) return;

          const commentsRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/${videoId}/comments?fields=id,from&filter=stream&limit=100&access_token=${page.access_token}`);
          const commentsData = await commentsRes.json();
          if (commentsData.error) continue; // Video lỗi quyền đọc comment thì bỏ qua, không chặn cả vòng quét

          for (const comment of (commentsData.data || [])) {
            if (!loop.active) return;
            if (loop.repliedCommentIds.has(comment.id)) continue;

            const replyRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/${comment.id}/comments`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: replyMessage, access_token: page.access_token })
            });
            const replyData = await replyRes.json();

            if (!replyData.error) {
              loop.repliedCommentIds.add(comment.id);
              repliedCount++;
            }

            await new Promise(resolve => setTimeout(resolve, 1200)); // Né rate limit, không spam liên tiếp
          }
        }

        replyStatusEl.className = 'page-card-status show ok';
        replyStatusEl.innerHTML = repliedCount > 0
          ? `✅ Đã auto-reply <b>${repliedCount}</b> comment mới trên ${videoIds.length} video.`
          : `✅ Đã quét ${videoIds.length} video — không có comment mới cần trả lời.`;

      } catch (err) {
        replyStatusEl.className = 'page-card-status show err';
        replyStatusEl.textContent = `❌ Lỗi auto-reply (${page.name}): ${err.message}`;
      }
    }

    // ================= QUY TRÌNH ĐĂNG 1 BÀI & CƠ CHẾ COMMENT (THEO TỪNG PAGE) =================
    async function runPostSequenceForPage(pageId) {
      const loop = pageLoops[pageId];
      const page = currentPages.find(p => p.id === pageId);
      const fileInput = document.getElementById(`videoFile_${pageId}`);
      const commentContent = document.getElementById(`comment_${pageId}`).value.trim();
      const isEnableComment = document.getElementById(`enableComment_${pageId}`).checked;
      const commentDelay = parseInt(document.getElementById(`commentDelay_${pageId}`).value) || 0;

      const statusEl = document.getElementById(`status_${pageId}`);
      const progressWrap = document.getElementById(`progressWrap_${pageId}`);
      const progressBar = document.getElementById(`progressBar_${pageId}`);

      // 1. Bốc ngẫu nhiên 1 video từ kho riêng của page này
      const randomIndex = Math.floor(Math.random() * fileInput.files.length);
      const selectedVideo = fileInput.files[randomIndex];

      // 2. Tách tên file làm tiêu đề Reels
      const videoTitle = selectedVideo.name.replace(/\.[^/.]+$/, "");
      const pageAccessToken = page.access_token;

      setBadge(pageId, 'running', 'Đang upload');
      statusEl.style.display = 'block';
      statusEl.className = 'page-card-status show loading';
      statusEl.innerHTML = `🚀 [Lượt mới] Đang bốc ngẫu nhiên video: <b>"${videoTitle}"</b> để tải lên...`;
      progressWrap.className = 'page-card-progress-wrap show';
      progressBar.style.width = '10%';

      try {
        // [PHASE 1] - Khởi tạo phiên Upload
        const initForm = new FormData();
        initForm.append('upload_phase', 'start');
        initForm.append('access_token', pageAccessToken);
        initForm.append('file_size', selectedVideo.size);

        const initRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, { method: 'POST', body: initForm });
        const initData = await initRes.json();
        if (initData.error) throw new Error("Lỗi Phase 1: " + initData.error.message);

        const videoId = initData.video_id;
        progressBar.style.width = '20%';

        // [PHASE 2] - Truyền dữ liệu dạng Chunking (băm file lớn)
        let startOffset = parseInt(initData.start_offset);
        let endOffset = parseInt(initData.end_offset);
        let sessionId = initData.upload_session_id;

        while (startOffset < selectedVideo.size) {
          if (!loop.active) return; // Kiểm tra ngắt giữa chừng khi user bấm Dừng page này

          const chunk = selectedVideo.slice(startOffset, endOffset);

          const uploadForm = new FormData();
          uploadForm.append('upload_phase', 'transfer');
          uploadForm.append('upload_session_id', sessionId);
          uploadForm.append('start_offset', startOffset);
          uploadForm.append('video_file_chunk', chunk);
          uploadForm.append('access_token', pageAccessToken);

          const uploadRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, { method: 'POST', body: uploadForm });
          const uploadData = await uploadRes.json();
          if (uploadData.error) throw new Error("Lỗi Phase 2: " + uploadData.error.message);

          startOffset = parseInt(uploadData.start_offset);
          endOffset = parseInt(uploadData.end_offset);

          let progressPercent = 20 + Math.floor((startOffset / selectedVideo.size) * 60);
          if (progressPercent > 80) progressPercent = 80;
          progressBar.style.width = `${progressPercent}%`;
        }

        // [PHASE 3] - Hoàn tất & Xuất bản bài viết
        const finishForm = new FormData();
        finishForm.append('upload_phase', 'finish');
        finishForm.append('upload_session_id', sessionId);
        finishForm.append('description', videoTitle);
        finishForm.append('video_state', 'PUBLISHED');
        finishForm.append('access_token', pageAccessToken);

        const finishRes = await fetch(`https://graph-video.facebook.com/${GRAPH_VERSION}/${page.id}/videos`, { method: 'POST', body: finishForm });
        const finishData = await finishRes.json();
        if (finishData.error) throw new Error("Lỗi Phase 3: " + finishData.error.message);

        progressBar.style.width = '100%';
        const postLink = `https://www.facebook.com/${page.id}/videos/${videoId}/`;

        // [PHASE 4] - Tự động Comment sau khi đăng
        if (isEnableComment && commentContent) {
            setBadge(pageId, 'running', `Chờ comment`);
            statusEl.className = 'page-card-status show loading';
            statusEl.innerHTML = `✅ Đã upload video thành công!<br>⏳ Đang chờ <b>${commentDelay} giây</b> để Facebook index bài đăng trước khi nhét comment...`;

            // Đếm ngược an toàn có kiểm tra lệnh Ngắt riêng cho page này
            for (let i = 0; i < commentDelay; i++) {
                if (!loop.active) return;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            if (!loop.active) return;
            statusEl.innerHTML = `⏳ Đang gửi comment tự động vào bài viết...`;

            const commentRes = await fetch(`https://graph.facebook.com/${GRAPH_VERSION}/${videoId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: commentContent,
                    access_token: pageAccessToken
                })
            });
            const commentData = await commentRes.json();
            if (commentData.error) throw new Error("Lỗi khi Comment: " + commentData.error.message);

            setBadge(pageId, 'ok', 'Thành công');
            statusEl.className = 'page-card-status show ok';
            statusEl.innerHTML = `
              🎉 <b>ĐĂNG THÀNH CÔNG!</b><br>
              - Page: <i>${page.name}</i><br>
              - Video: <i>${videoTitle}</i><br>
              - Đã thả comment tự động.<br>
              🔗 Link Reels: <a href="${postLink}" target="_blank" class="post-link">${postLink}</a>
            `;
        } else {
            setBadge(pageId, 'ok', 'Thành công');
            statusEl.className = 'page-card-status show ok';
            statusEl.innerHTML = `
              🎉 <b>ĐĂNG THÀNH CÔNG!</b><br>
              - Page: <i>${page.name}</i><br>
              - Video: <i>${videoTitle}</i><br>
              🔗 Link Reels: <a href="${postLink}" target="_blank" class="post-link">${postLink}</a>
            `;
        }

      } catch (err) {
        // Nếu bị lỗi 1 bài trên page này, báo lỗi và vẫn trả quy trình về Trigger Loop tiếp theo của riêng page đó
        setBadge(pageId, 'err', 'Lỗi');
        statusEl.style.display = 'block';
        statusEl.className = 'page-card-status show err';
        statusEl.textContent = `❌ Lỗi bài đăng hiện tại (${page.name}): ${err.message}`;
        await new Promise(resolve => setTimeout(resolve, 5000));
      }
    }
  </script>
