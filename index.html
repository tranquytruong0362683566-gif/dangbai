<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Douyin Video Downloader | Pro Dev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="container">
        <header>
            <h1><i class="fa-brands fa-tiktok"></i> Douyin Downloader</h1>
            <p>Tải video Douyin không watermark chất lượng cao</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <i class="fa-solid fa-link icon"></i>
                <input type="url" id="videoUrl" placeholder="Dán link video Douyin vào đây (VD: https://v.douyin.com/...)" required autocomplete="off">
                <button id="fetchBtn" onclick="processVideo()">
                    <span class="btn-text">Lấy Video</span>
                    <i class="fa-solid fa-spinner fa-spin loader" style="display: none;"></i>
                </button>
            </div>
            <div id="errorMsg" class="error-message"></div>
        </section>

        <section id="resultSection" class="result-section hidden">
            <div class="video-info">
                <img id="videoThumb" src="" alt="Thumbnail">
                <div class="details">
                    <h3 id="videoTitle">Đang tải...</h3>
                    <div class="actions">
                        <a id="downloadBtn" href="#" target="_blank" class="download-btn">
                            <i class="fa-solid fa-cloud-arrow-down"></i> Tải Video (No Watermark)
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
