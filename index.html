<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Douyin Video Downloader | Pro Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           CSS STYLES
           ========================================= */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #ec4899;
            --primary-hover: #db2777;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            position: relative;
            gap: 10px;
        }

        .input-group .icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input {
            flex: 1;
            padding: 14px 15px 14px 45px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: var(--text-main);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error);
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: left;
        }

        /* Result Section */
        .result-section {
            margin-top: 30px;
            background-color: #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        .video-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #videoThumb {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .details {
            flex: 1;
        }

        #videoTitle {
            font-size: 1rem;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .download-btn {
            display: inline-block;
            background-color: #10b981;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background-color: #059669;
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            button {
                padding: 14px;
            }
            .video-info {
                flex-direction: column;
                text-align: center;
            }
            #videoThumb {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1><i class="fa-brands fa-tiktok"></i> Douyin Downloader</h1>
            <p>Tải video Douyin không watermark chất lượng cao</p>
        </header>

        <section class="input-section">
            <div class="input-group">
                <i class="fa-solid fa-link icon"></i>
                <input type="url" id="videoUrl" placeholder="Dán link video Douyin vào đây..." required autocomplete="off">
                <button id="fetchBtn" onclick="processVideo()">
                    <span class="btn-text">Lấy Video</span>
                    <i class="fa-solid fa-spinner fa-spin loader" style="display: none;"></i>
                </button>
            </div>
            <div id="errorMsg" class="error-message"></div>
        </section>

        <section id="resultSection" class="result-section hidden">
            <div class="video-info">
                <img id="videoThumb" src="" alt="Thumbnail">
                <div class="details">
                    <h3 id="videoTitle">Đang tải...</h3>
                    <div class="actions">
                        <a id="downloadBtn" href="#" target="_blank" class="download-btn">
                            <i class="fa-solid fa-cloud-arrow-down"></i> Tải Video
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CẤU HÌNH API
        const API_URL = 'https://your-rapidapi-endpoint.com/douyin/download'; 
        const API_KEY = 'https://lingering-surf-a4d7.tranquytruong0362683566.workers.dev/';

        const elements = {
            urlInput: document.getElementById('videoUrl'),
            fetchBtn: document.getElementById('fetchBtn'),
            btnText: document.querySelector('.btn-text'),
            loader: document.querySelector('.loader'),
            errorMsg: document.getElementById('errorMsg'),
            resultSection: document.getElementById('resultSection'),
            videoThumb: document.getElementById('videoThumb'),
            videoTitle: document.getElementById('videoTitle'),
            downloadBtn: document.getElementById('downloadBtn')
        };

        async function processVideo() {
            const url = elements.urlInput.value.trim();
            
            if (!url) {
                showError('Vui lòng nhập đường dẫn video Douyin.');
                return;
            }
            if (!url.includes('douyin.com')) {
                showError('Link không hợp lệ. Vui lòng nhập link Douyin.');
                return;
            }

            showError('');
            setLoading(true);
            elements.resultSection.classList.add('hidden');

            try {
                // Fetch request mẫu (cần thay thế bằng specs API thực tế của bạn)
                const response = await fetch(`${API_URL}?url=${encodeURIComponent(url)}`, {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': API_KEY,
                        'X-RapidAPI-Host': 'your-api-host.p.rapidapi.com'
                    }
                });

                if (!response.ok) throw new Error('Lỗi kết nối đến server.');

                const data = await response.json();

                if (data && data.video_url_no_watermark) {
                    renderResult(data);
                } else {
                    throw new Error('Không thể bóc tách video. Link có thể bị lỗi hoặc riêng tư.');
                }

            } catch (error) {
                showError(error.message || 'Đã xảy ra lỗi không xác định.');
            } finally {
                setLoading(false);
            }
        }

        function renderResult(data) {
            elements.videoThumb.src = data.thumbnail_url || 'https://via.placeholder.com/150x150?text=No+Image';
            elements.videoTitle.textContent = data.title || 'Video Douyin';
            elements.downloadBtn.href = data.video_url_no_watermark;
            elements.downloadBtn.setAttribute('download', 'douyin-video.mp4'); 
            
            elements.resultSection.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            elements.urlInput.disabled = isLoading;
            elements.fetchBtn.disabled = isLoading;
            elements.btnText.style.display = isLoading ? 'none' : 'block';
            elements.loader.style.display = isLoading ? 'block' : 'none';
        }

        function showError(msg) {
            elements.errorMsg.textContent = msg;
        }

        elements.urlInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') processVideo();
        });
    </script>
</body>
</html>
