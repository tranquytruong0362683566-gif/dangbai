<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FB Auto Post Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117; color: #e2e8f0;
      min-height: 100vh; padding: 24px 16px;
    }
    .wrap { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 14px; padding: 20px 22px; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 17px; font-weight: 700; color: #818cf8; text-transform: uppercase; }

    /* EXT STATUS */
    .ext-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #0f1117; border: 1px solid #2d3148;
      border-radius: 10px; padding: 10px 14px; font-size: 13px;
    }
    .ext-status { color: #94a3b8; }
    .ext-status.ok { color: #34d399; }
    .ext-status.err { color: #f87171; }
    .btn-get-cookie {
      background: #4f46e5; color: #fff; border: none;
      border-radius: 7px; padding: 6px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-get-cookie:hover { background: #4338ca; }

    /* FORM */
    .section-title {
      font-size: 11px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #2d3148; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }

    input[type="text"], textarea {
      width: 100%; background: #0f1117; border: 1px solid #2d3148;
      border-radius: 9px; padding: 9px 12px;
      font-size: 13px; font-family: inherit; color: #e2e8f0; resize: none;
    }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: #4f46e5; }
    input::placeholder, textarea::placeholder { color: #475569; }
    textarea { height: 80px; }

    .cookie-row { display: flex; gap: 8px; }
    .cookie-row input { flex: 1; font-family: monospace; font-size: 11px; }
    .btn-paste {
      background: #1e2235; color: #818cf8; border: 1px solid #2d3148;
      border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-paste:hover { background: #2d3148; }

    /* TABS */
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 9px; text-align: center;
      background: #0f1117; border: 1px solid #2d3148;
      border-radius: 9px; font-size: 13px; font-weight: 600;
      color: #475569; cursor: pointer; transition: all 0.2s;
    }
    .tab.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    /* POST FORM */
    .post-section { display: none; }
    .post-section.active { display: block; }

    /* SCHEDULE */
    .schedule-row { display: flex; gap: 10px; }
    .schedule-row .form-group { flex: 1; }

    /* BUTTONS */
    .btn-post {
      width: 100%; background: #4f46e5; color: #fff; border: none;
      border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
      margin-top: 4px;
    }
    .btn-post:hover:not(:disabled) { background: #4338ca; }
    .btn-post:disabled { background: #2d3148; color: #475569; cursor: not-allowed; }

    /* LOG */
    .log-box {
      background: #0f1117; border: 1px solid #2d3148; border-radius: 10px;
      padding: 12px; max-height: 180px; overflow-y: auto;
      font-family: monospace; font-size: 12px; line-height: 1.7;
    }
    .log-box .log-ok { color: #34d399; }
    .log-box .log-err { color: #f87171; }
    .log-box .log-info { color: #94a3b8; }
    .log-empty { color: #334155; font-style: italic; }

    /* PROGRESS */
    .progress-bar { width: 100%; height: 6px; background: #2d3148; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4f46e5; border-radius: 3px; width: 0%; transition: width 0.3s; }

    select {
      width: 100%; background: #0f1117; border: 1px solid #2d3148;
      border-radius: 9px; padding: 9px 12px;
      font-size: 13px; color: #e2e8f0;
    }
    select:focus { outline: none; border-color: #4f46e5; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="card">
    <div class="header">
      <span style="font-size:26px">🤖</span>
      <div>
        <h1>FB Auto Post Tool</h1>
        <div style="font-size:11px;color:#475569;margin-top:2px">Tự động đăng bài & Reels Facebook</div>
      </div>
    </div>
  </div>

  <!-- COOKIE -->
  <div class="card">
    <div class="section-title">🍪 Cookie Facebook</div>

    <div class="ext-bar" style="margin-bottom:14px">
      <span class="ext-status" id="extStatus">🔌 Đang kiểm tra extension...</span>
      <button class="btn-get-cookie" id="btnGetCookie">Lấy Cookie từ Extension</button>
    </div>

    <div class="form-group">
      <label>Cookie String</label>
      <div class="cookie-row">
        <input type="text" id="cookieInput" placeholder="Dán cookie vào đây hoặc lấy từ extension...">
        <button class="btn-paste" id="btnPasteCookie">📋 Dán</button>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:0">
      <label>UID Facebook (c_user)</label>
      <input type="text" id="uidDisplay" readonly placeholder="Sẽ tự động điền khi có cookie..." style="color:#34d399">
    </div>
  </div>

  <!-- POST TABS -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="post">📝 Đăng Bài Viết</div>
      <div class="tab" data-tab="reels">🎬 Đăng Reels</div>
    </div>

    <!-- POST -->
    <div class="post-section active" id="tab-post">
      <div class="section-title">Nội dung bài viết</div>

      <div class="form-group">
        <label>ID Trang/Nhóm (để trống = đăng tường cá nhân)</label>
        <input type="text" id="postPageId" placeholder="VD: 123456789">
      </div>

      <div class="form-group">
        <label>Nội dung bài viết</label>
        <textarea id="postContent" placeholder="Nhập nội dung bài viết..."></textarea>
      </div>

      <div class="form-group">
        <label>Link hình ảnh (mỗi link một dòng, để trống nếu không có)</label>
        <textarea id="postImages" style="height:60px" placeholder="https://example.com/image.jpg"></textarea>
      </div>

      <div class="form-group">
        <label>Chế độ đăng</label>
        <select id="postPrivacy">
          <option value="EVERYONE">🌍 Công khai</option>
          <option value="FRIENDS">👥 Bạn bè</option>
          <option value="ONLY_ME">🔒 Chỉ mình tôi</option>
        </select>
      </div>

      <button class="btn-post" id="btnPost">🚀 Đăng Bài Ngay</button>
    </div>

    <!-- REELS -->
    <div class="post-section" id="tab-reels">
      <div class="section-title">Thông tin Reels</div>

      <div class="form-group">
        <label>ID Trang Facebook (bắt buộc cho Reels)</label>
        <input type="text" id="reelsPageId" placeholder="VD: 123456789">
      </div>

      <div class="form-group">
        <label>Link video Reels (URL trực tiếp .mp4)</label>
        <input type="text" id="reelsVideoUrl" placeholder="https://example.com/video.mp4">
      </div>

      <div class="form-group">
        <label>Mô tả Reels</label>
        <textarea id="reelsDescription" placeholder="Nhập mô tả cho Reels..."></textarea>
      </div>

      <button class="btn-post" id="btnReels">🎬 Đăng Reels Ngay</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="section-title">📋 Nhật ký hoạt động</div>
    <div class="log-box" id="logBox">
      <div class="log-empty">Chưa có hoạt động nào...</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

</div>

<script>
  // ===========================
  // EXTENSION BRIDGE
  // ===========================
  let fbCookies = '';

  // Kiểm tra extension có được cài không
  function checkExtension() {
    const status = document.getElementById('extStatus');
    window.postMessage({ type: 'GET_FB_COOKIES' }, '*');

    setTimeout(() => {
      if (!fbCookies) {
        status.textContent = '⚠️ Extension chưa cài hoặc chưa đăng nhập FB';
        status.className = 'ext-status err';
      }
    }, 2000);
  }

  // Lắng nghe phản hồi từ bridge.js
  window.addEventListener('message', (event) => {
    if (event.data.type === 'FB_COOKIES_RESPONSE') {
      const status = document.getElementById('extStatus');
      if (event.data.success && event.data.cookie_string) {
        fbCookies = event.data.cookie_string;
        document.getElementById('cookieInput').value = fbCookies;
        status.textContent = '✅ Extension đã kết nối — Cookie đã lấy!';
        status.className = 'ext-status ok';

        // Hiển thị UID
        const cUser = event.data.cookies?.find(c => c.name === 'c_user');
        if (cUser) document.getElementById('uidDisplay').value = cUser.value;
        log('✅ Đã lấy cookie từ extension thành công!', 'ok');
      } else {
        status.textContent = '❌ Chưa đăng nhập Facebook';
        status.className = 'ext-status err';
      }
    }
  });

  document.getElementById('btnGetCookie').addEventListener('click', () => {
    window.postMessage({ type: 'GET_FB_COOKIES' }, '*');
    log('🔌 Đang yêu cầu cookie từ extension...', 'info');
  });

  document.getElementById('btnPasteCookie').addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('cookieInput').value = text;
      fbCookies = text;

      // Parse c_user từ cookie string
      const match = text.match(/c_user=(\d+)/);
      if (match) document.getElementById('uidDisplay').value = match[1];
      log('📋 Đã dán cookie thủ công', 'info');
    } catch { alert('Không thể dán. Hãy dán thủ công bằng Ctrl+V.'); }
  });

  // Sync cookie input với biến fbCookies
  document.getElementById('cookieInput').addEventListener('input', (e) => {
    fbCookies = e.target.value;
    const match = fbCookies.match(/c_user=(\d+)/);
    if (match) document.getElementById('uidDisplay').value = match[1];
  });

  // ===========================
  // TABS
  // ===========================
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.post-section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ===========================
  // LOG
  // ===========================
  function log(msg, type = 'info') {
    const box = document.getElementById('logBox');
    const empty = box.querySelector('.log-empty');
    if (empty) empty.remove();
    const line = document.createElement('div');
    line.className = 'log-' + type;
    line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  // ===========================
  // ĐĂNG BÀI
  // ===========================
  document.getElementById('btnPost').addEventListener('click', async () => {
    const cookie = document.getElementById('cookieInput').value.trim();
    const content = document.getElementById('postContent').value.trim();
    const pageId = document.getElementById('postPageId').value.trim();
    const privacy = document.getElementById('postPrivacy').value;

    if (!cookie) { alert('Vui lòng nhập hoặc lấy cookie Facebook!'); return; }
    if (!content) { alert('Vui lòng nhập nội dung bài viết!'); return; }

    const btn = document.getElementById('btnPost');
    btn.disabled = true; btn.textContent = '⏳ Đang đăng...';
    log('📝 Bắt đầu đăng bài...', 'info');
    setProgress(30);

    try {
      // Parse fb_dtsg từ cookie hoặc lấy từ trang Facebook
      // Đây là logic demo — thực tế cần lấy fb_dtsg token từ trang FB
      const uid = document.getElementById('uidDisplay').value;
      if (!uid) throw new Error('Không tìm thấy UID. Vui lòng kiểm tra cookie.');

      // Demo: hiển thị thông tin sẽ đăng
      // Trong thực tế bạn cần gọi API Facebook Graph hoặc endpoint nội bộ
      setProgress(80);
      log(`✅ Demo: Sẽ đăng lên ${pageId ? 'Trang ' + pageId : 'Tường cá nhân ' + uid}`, 'ok');
      log(`📄 Nội dung: "${content.substring(0, 50)}${content.length > 50 ? '...' : ''}"`, 'ok');
      log(`🔒 Chế độ: ${privacy}`, 'info');
      log('ℹ️ Tích hợp API Facebook thực tế cần fb_dtsg token — xem hướng dẫn bên dưới', 'info');
      setProgress(100);

    } catch(e) {
      log('❌ Lỗi: ' + e.message, 'err');
      setProgress(0);
    } finally {
      btn.disabled = false; btn.textContent = '🚀 Đăng Bài Ngay';
    }
  });

  // ===========================
  // ĐĂNG REELS
  // ===========================
  document.getElementById('btnReels').addEventListener('click', async () => {
    const cookie = document.getElementById('cookieInput').value.trim();
    const pageId = document.getElementById('reelsPageId').value.trim();
    const videoUrl = document.getElementById('reelsVideoUrl').value.trim();
    const desc = document.getElementById('reelsDescription').value.trim();

    if (!cookie) { alert('Vui lòng nhập hoặc lấy cookie Facebook!'); return; }
    if (!pageId) { alert('Vui lòng nhập ID Trang Facebook!'); return; }
    if (!videoUrl) { alert('Vui lòng nhập link video!'); return; }

    const btn = document.getElementById('btnReels');
    btn.disabled = true; btn.textContent = '⏳ Đang xử lý...';
    log('🎬 Bắt đầu đăng Reels...', 'info');
    setProgress(20);

    try {
      const uid = document.getElementById('uidDisplay').value;
      if (!uid) throw new Error('Không tìm thấy UID. Vui lòng kiểm tra cookie.');

      setProgress(70);
      log(`✅ Demo: Sẽ đăng Reels lên Trang ${pageId}`, 'ok');
      log(`🎥 Video: ${videoUrl.substring(0, 60)}...`, 'ok');
      log(`📄 Mô tả: "${desc.substring(0, 50)}${desc.length > 50 ? '...' : ''}"`, 'ok');
      log('ℹ️ Tích hợp Reels API thực tế cần access token — xem hướng dẫn', 'info');
      setProgress(100);

    } catch(e) {
      log('❌ Lỗi: ' + e.message, 'err');
      setProgress(0);
    } finally {
      btn.disabled = false; btn.textContent = '🎬 Đăng Reels Ngay';
    }
  });

  function setProgress(pct) {
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // Khởi tạo
  window.addEventListener('load', () => {
    checkExtension();
    log('🚀 Web Tool đã sẵn sàng!', 'info');
  });
</script>
</body>
</html>
